services:
  rpc-server:
    build: ./server
    container_name: dc-lab5-rpc-server
    working_dir: /app
    command: ["bash", "-lc", "./run_server.sh"]

  rpc-client:
    build: ./client
    container_name: dc-lab5-rpc-client
    working_dir: /app
    depends_on:
      - rpc-server
    stdin_open: true
    tty: true
    command: ["bash", "-lc", "sleep infinity"]
